name: Android CI

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x app/gradlew

    - name: Build Triangulation APK
      run: cd app && ./gradlew assembleDebug

    - name: Copy Triangulation APK
      run: cp app/app/build/outputs/apk/debug/Triangulation-debug.apk triangulation.apk

    - name: Upload Triangulation APK
      uses: actions/upload-artifact@v4
      with:
        name: triangulation-apk
        path: triangulation.apk

    - name: Release APK
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: triangulation.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
