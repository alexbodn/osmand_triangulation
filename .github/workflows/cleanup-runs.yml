name: Cleanup Old Workflow Runs

on:
  schedule:
    - cron: '0 0 * * *' # Run daily
  workflow_dispatch: # Allow manual triggering

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete old workflow runs (keep last 3)
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 3
          delete_run_by_conclusion_pattern: "success, failure, cancelled, skipped"

      - name: Delete this specific run history
        if: always()
        run: |
          gh api \
            --method DELETE \
            -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          GH_TOKEN: ${{ github.token }}
